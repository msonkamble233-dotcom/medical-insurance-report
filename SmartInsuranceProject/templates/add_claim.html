<!DOCTYPE html>
<html>
<head>
    <title>Submit Claim | MediClaim Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color:#e5e7eb;
            min-height:100vh;
        }

        /* PAGE WRAPPER */
        .page-wrapper{
            padding:30px;
        }

        /* HEADER */
        .page-header{
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;
            padding:25px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            margin-bottom:25px;
        }

        .page-header h2{
            margin:0;
            font-weight:700;
        }

        .page-header p{
            margin-top:8px;
            color:#94a3b8;
            font-size:14px;
        }

        /* FORM CARD */
        .form-card{
            background: rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            padding:25px;
            backdrop-filter: blur(12px);
            box-shadow:0 15px 40px rgba(0,0,0,0.5);
            transition:0.3s;
        }

        .form-card:hover{
            transform: translateY(-4px);
        }

        /* LABELS */
        .form-label{
            color:#cbd5e1;
            font-weight:500;
        }

        /* INPUTS */
        .form-control,
        .form-select{
            background: rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.12);
            color:white;
            border-radius:12px;
            padding:10px;
        }

        .form-control:focus,
        .form-select:focus{
            background: rgba(255,255,255,0.1);
            color:white;
            border-color:#3b82f6;
            box-shadow:none;
        }

        /* BUTTON */
        .btn-submit{
            background: linear-gradient(90deg,#3b82f6,#2563eb);
            border:none;
            border-radius:30px;
            padding:12px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-submit:hover{
            transform: scale(1.03);
            box-shadow:0 10px 25px rgba(59,130,246,0.4);
        }

        /* SMALL ANIMATION */
        .fade-in{
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1; transform:translateY(0);}
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<div class="page-wrapper fade-in">

    <!-- HEADER -->
    <div class="page-header">
        <h2>💰 Submit Insurance Claim</h2>
        <p>Create and process insurance claims securely with verification system</p>
    </div>

    <!-- FORM -->
    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="form-card">

                <form action="/save_claim" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Patient</label>
                        <select name="patient_id" class="form-select" required>
                            <option value="">Select Patient</option>
                            {% for p in patients %}
                            <option value="{{ p[0] }}">{{ p[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Policy</label>
                        <select name="policy_id" class="form-select" required>
                            <option value="">Select Policy</option>
                            {% for p in policies %}
                            <option value="{{ p[0] }}">{{ p[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hospital</label>
                        <select name="hospital_id" class="form-select" required>
                            <option value="">Select Hospital</option>
                            {% for h in hospitals %}
                            <option value="{{ h[0] }}">{{ h[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Claim Amount</label>
                        <input type="number"
                               class="form-control"
                               name="claim_amount"
                               placeholder="Enter claim amount"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Claim Date</label>
                        <input type="date"
                               class="form-control"
                               name="claim_date"
                               required>
                    </div>

                    <button type="submit" class="btn btn-submit w-100">
                        🚀 Submit Claim
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
