<!DOCTYPE html>
<html>
<head>
    <title>Add Hospital | MediClaim Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color:#e5e7eb;
            min-height:100vh;
        }

        .page-wrapper{
            padding:30px;
        }

        /* HEADER */
        .page-header{
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;
            padding:25px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            margin-bottom:25px;
        }

        .page-header h2{
            margin:0;
            font-weight:700;
        }

        .page-header p{
            margin-top:8px;
            color:#94a3b8;
            font-size:14px;
        }

        /* FORM CARD */
        .form-card{
            background: rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            padding:25px;
            backdrop-filter: blur(12px);
            box-shadow:0 15px 40px rgba(0,0,0,0.5);
            transition:0.3s;
        }

        .form-card:hover{
            transform: translateY(-4px);
        }

        /* LABEL */
        .form-label{
            color:#cbd5e1;
            font-weight:500;
        }

        /* INPUT */
        .form-control{
            background: rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.12);
            color:white;
            border-radius:12px;
            padding:10px;
        }

        .form-control:focus{
            background: rgba(255,255,255,0.1);
            color:white;
            border-color:#3b82f6;
            box-shadow:none;
        }

        /* BUTTON */
        .btn-save{
            background: linear-gradient(90deg,#10b981,#059669);
            border:none;
            border-radius:30px;
            padding:12px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-save:hover{
            transform: scale(1.03);
            box-shadow:0 10px 25px rgba(16,185,129,0.4);
        }

        /* ANIMATION */
        .fade-in{
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1; transform:translateY(0);}
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<div class="page-wrapper fade-in">

    <!-- HEADER -->
    <div class="page-header">
        <h2>🏥 Add Hospital</h2>
        <p>Register and manage hospitals in the insurance network system</p>
    </div>

    <!-- FORM -->
    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="form-card">

                <form action="/save_hospital" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Hospital Name</label>
                        <input type="text" name="hospital_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Contact Number</label>
                        <input type="text" name="contact_number"
                               class="form-control"
                               placeholder="Enter contact number"
                               required>
                    </div>

                    <button type="submit" class="btn btn-save w-100">
                        🏥 Save Hospital
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
