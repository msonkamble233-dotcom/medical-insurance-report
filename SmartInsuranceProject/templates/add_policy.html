<!DOCTYPE html>
<html>
<head>
<title>Add Insurance Policy | MediClaim Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0a0f1c;
    color:#e5e7eb;
}

/* HEADER */
.page-header{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:20px;
    text-align:center;
    margin-top:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* INPUTS */
.form-control, .form-select{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    border-radius:10px;
}

.form-control:focus, .form-select:focus{
    background:rgba(255,255,255,0.08);
    border-color:#3b82f6;
    box-shadow:none;
    color:white;
}

/* BUTTON */
.btn-primary{
    border-radius:10px;
    padding:10px;
    font-weight:600;
}

/* LABELS */
.form-label{
    margin-bottom:6px;
    font-size:14px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header mt-4">
        <h2>📄 Add Insurance Policy</h2>
        <p class="mb-0 text-muted">
            Register a new insurance policy for a patient
        </p>
    </div>

    <!-- FORM -->
    <div class="row justify-content-center mt-4">

        <div class="col-md-7">

            <div class="card p-4">

                <form action="/save_policy" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Patient</label>
                        <select name="patient_id" class="form-select" required>
                            <option value="">Select Patient</option>
                            {% for p in patients %}
                            <option value="{{ p[0] }}">{{ p[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Policy Number</label>
                        <input type="text" class="form-control" name="policy_number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Coverage Amount</label>
                        <input type="number" class="form-control" name="coverage_amount" placeholder="Enter amount" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" class="form-control" name="start_date" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-control" name="end_date" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Save Policy
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
