<!DOCTYPE html>
<html>
<head>

<title>Login | MediClaim Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* FULL BACKGROUND */
body{
    margin:0;
    height:100vh;
    font-family:Segoe UI;

    background:
    linear-gradient(rgba(10,15,28,0.85), rgba(10,15,28,0.95)),
    url('https://images.unsplash.com/photo-1580281657527-47f249e8f12c');

    background-size:cover;
    background-position:center;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGIN CARD (GLASS EFFECT) */
.login-card{
    width:420px;
    padding:30px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;

    backdrop-filter:blur(12px);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);

    color:#e5e7eb;
}

/* TITLE */
.login-title{
    text-align:center;
    margin-bottom:20px;
}

.login-title h2{
    font-weight:700;
}

/* INPUTS */
.form-control{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    border-radius:10px;
}

.form-control:focus{
    background:rgba(255,255,255,0.12);
    color:white;
    border-color:#3b82f6;
    box-shadow:none;
}

/* LABEL */
label{
    font-size:14px;
    color:#cbd5e1;
}

/* BUTTON */
.btn-primary{
    border-radius:10px;
    padding:10px;
    font-weight:600;
}

/* BRAND TEXT */
.brand{
    text-align:center;
    font-size:14px;
    color:#94a3b8;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="login-title">
        <h2>🏥 MediClaim Pro</h2>
        <p class="text-muted">Insurance Claim Management System</p>
    </div>

    <form action="/login" method="POST">

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <div class="brand">
        Secure Admin Access Only
    </div>

</div>

</body>
</html>
