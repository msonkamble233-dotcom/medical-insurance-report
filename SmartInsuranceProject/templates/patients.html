<!DOCTYPE html>
<html>
<head>

<title>Patients | MediClaim Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* GLOBAL */
body{
    margin:0;
    font-family:Segoe UI;
    background:#0a0f1c;
    color:#e5e7eb;
}

/* SIDEBAR (PRO STYLE SAME AS DASHBOARD) */
.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;

    background:linear-gradient(180deg,#0f172a,#0a0f1c);
    border-right:1px solid rgba(255,255,255,0.08);
    padding:20px;
}

.sidebar h3{
    font-size:18px;
    margin-bottom:25px;
}

.sidebar a{
    display:block;
    padding:12px;
    border-radius:10px;
    color:#cbd5e1;
    text-decoration:none;
    margin-bottom:8px;
    transition:0.25s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.1);
    color:white;
    transform:translateX(6px);
}

/* MAIN */
.main-content{
    margin-left:260px;
    padding:25px;
}

/* HEADER */
.header-card{
    background:rgba(255,255,255,0.06);
    border-radius:18px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

/* SEARCH */
.search-card{
    background:rgba(255,255,255,0.04);
    border-radius:16px;
    padding:15px;
    border:1px solid rgba(255,255,255,0.08);
    margin-bottom:15px;
}

.search-box{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    padding:10px;
    border-radius:10px;
}

/* TABLE CARD */
.table-card{
    background:rgba(255,255,255,0.05);
    border-radius:18px;
    padding:15px;
    border:1px solid rgba(255,255,255,0.08);
}

/* TABLE (CLEAN PROFESSIONAL STYLE) */
.table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 10px;
    color:white;
}

.table thead th{
    background:rgba(255,255,255,0.12);
    padding:14px;
    font-size:13px;
    border:none;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.table tbody tr{
    background:rgba(255,255,255,0.06);
    transition:0.25s;
    border-radius:10px;
}

.table tbody tr:hover{
    background:rgba(255,255,255,0.12);
    transform:scale(1.01);
}

.table tbody td{
    padding:14px;
    border:none;
}

/* BUTTON */
.btn-success{
    border-radius:10px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>🏥 MediClaim Pro</h3>

    <a href="/">📊 Dashboard</a>
    <a href="/patients">👥 Patients</a>
    <a href="/policies">📜 Policies</a>
    <a href="/hospitals">🏥 Hospitals</a>
    <a href="/claims">📄 Claims</a>
    <a href="/reports">📊 Reports</a>
    <a href="/logout">🚪 Logout</a>

</div>

<!-- MAIN -->
<div class="main-content">

<!-- HEADER -->
<div class="header-card">

    <h4 class="mb-0">👥 Patient Records</h4>

    <a href="/add_patient" class="btn btn-success">
        + Add Patient
    </a>

</div>

<!-- SEARCH -->
<div class="search-card">

<form method="GET" action="/patients">

<div class="row g-2">

    <div class="col-md-9">
        <input type="text"
               class="form-control search-box"
               name="search"
               placeholder="Search patient name, phone or email"
               value="{{ search }}">
    </div>

    <div class="col-md-3">
        <button class="btn btn-primary w-100">
            Search
        </button>
    </div>

</div>

</form>

</div>

<!-- TABLE -->
<div class="table-card">

<div class="table-responsive">

<table class="table">

<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Gender</th>
    <th>Phone</th>
    <th>Email</th>
</tr>
</thead>

<tbody>

{% for p in patients %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>{{ p[3] }}</td>
    <td>{{ p[4] }}</td>
    <td>{{ p[5] }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
